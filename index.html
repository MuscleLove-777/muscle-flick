<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>筋肉フリック / Muscle Flick | MuscleLove</title>
    <link rel="stylesheet" href="style.css">
    <meta property="og:title" content="筋肉フリック / Muscle Flick | MuscleLove">
    <meta property="og:description" content="スワイプで推し筋肉を選べ！Swipe to pick your favorite muscles!">
    <meta name="description" content="Tinder風スワイプで筋肉画像をLIKE or SKIP！あなたの推しコレクションを作ろう！">
  <meta property="og:image" content="https://musclelove-777.github.io/muscle-flick/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:type" content="image/png">
  <meta name="twitter:image" content="https://musclelove-777.github.io/muscle-flick/og.png">
</head>
<body>
    <!-- Start Screen -->
    <div id="screen-start" class="screen active">
        <div class="container">
            <h1 class="title glow">筋肉フリック<br><span class="title-en">Muscle Flick</span></h1>
            <p class="subtitle">スワイプで推し筋肉を選べ！<br>Swipe to pick your favorites!</p>
            <div class="instructions">
                <div class="instruction-row">
                    <span class="instruction-icon">👉</span>
                    <span>右スワイプ = LIKE 💪<br>Swipe Right = LIKE</span>
                </div>
                <div class="instruction-row">
                    <span class="instruction-icon">👈</span>
                    <span>左スワイプ = SKIP 👋<br>Swipe Left = SKIP</span>
                </div>
            </div>
            <button id="btn-start" class="btn btn-primary">START 💪</button>
            <div class="brand">
                <span class="brand-name">MuscleLove</span>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="screen-game" class="screen">
        <div class="game-header">
            <div class="progress-text"><span id="current-num">1</span> / <span id="total-num">10</span></div>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
            <div class="score-display">LIKED: <span id="like-count">0</span></div>
        </div>
        <div class="card-area">
            <div id="card-container" class="card-container">
                <div id="swipe-card" class="swipe-card">
                    <div class="card-label card-label-like" id="label-like">LIKE 💪</div>
                    <div class="card-label card-label-skip" id="label-skip">SKIP 👋</div>
                    <img id="card-image" class="card-image" src="" alt="Muscle" draggable="false">
                </div>
            </div>
        </div>
        <div class="swipe-hints">
            <span class="hint-skip">👋 SKIP</span>
            <span class="hint-like">LIKE 💪</span>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="screen-result" class="screen">
        <div class="container result-container">
            <h2 class="result-title glow" id="result-title">あなたの推しTOP<br><span class="title-en">Your Favorites</span></h2>
            <div id="result-message" class="result-message"></div>
            <div id="liked-grid" class="liked-grid"></div>
            <div class="result-stats" id="result-stats"></div>
            <div class="result-buttons">
                <button id="btn-share" class="btn btn-share">Xでシェア / Share on X</button>
                <button id="btn-retry" class="btn btn-primary">もう一度 / Try Again 🔄</button>
            </div>
            <div class="patreon-cta">
                <p>もっと筋肉を見たい？<br>Want more muscles?</p>
                <a href="https://www.patreon.com/cw/MuscleLove" target="_blank" rel="noopener noreferrer" class="btn btn-patreon">
                    Patreonで応援 / Support on Patreon 🔥
                </a>
            </div>
            <div class="brand">
                <span class="brand-name">MuscleLove</span>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
